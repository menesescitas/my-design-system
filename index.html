<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de Tokens - PDS</title>
    <link rel="stylesheet" href="./build/css/variables.css">
    <style>
        body { 
            font-family: sans-serif; 
            background-color: var(--global-pds-color-primary-gray-50); 
            padding: 40px;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            border-top: 8px solid var(--global-pds-color-primary-purple-500);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: var(--global-pds-color-primary-purple-900); }
        .swatch {
            display: inline-block;
            width: 100px;
            height: 100px;
            border-radius: 8px;
            margin: 10px;
            /* Usamos tu Indigo 500 */
            background-color: var(--global-pds-color-primary-indigo-500);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Mis Tokens están vivos! 🚀</h1>
        <p>Este color púrpura de arriba y este cuadro vienen de Figma.</p>
        <div class="swatch"></div>
        <p>Variable usada: <code>--global-pds-color-primary-purple-500</code></p>
    </div>
</body>
</html>
