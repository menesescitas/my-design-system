<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDS - Sistema de Diseño</title>
    <link rel="stylesheet" href="./build/css/variables.css">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* Usamos tu color de fondo Indigo 50 */
            background-color: var(--global-pds-color-primary-indigo-50);
        }
        .card {
            /* Usamos tu Purple 500 para el fondo */
            background-color: var(--global-pds-color-primary-purple-500);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            text-align: center;
        }
        .status-badge {
            margin-top: 1rem;
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: bold;
            /* Usamos tu color de Success */
            background-color: var(--global-pds-color-success-500);
            color: #1F0D3F;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Hola desde Figma! 🚀</h1>
        <p>Este componente usa mis Design Tokens automatizados.</p>
        <div class="status-badge">Conexión Exitosa</div>
    </div>
</body>
</html>
